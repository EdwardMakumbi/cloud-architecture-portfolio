<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- USERS -->
  <rect x="40" y="120" width="120" height="60" rx="8" ry="8" fill="#f3f4f6" stroke="#111827" />
  <text x="100" y="155" text-anchor="middle" font-family="Arial" font-size="14" fill="#111827">
    USERS
  </text>

  <!-- Route 53 -->
  <rect x="220" y="120" width="140" height="60" rx="8" ry="8" fill="#e0f2fe" stroke="#0f172a" />
  <text x="290" y="145" text-anchor="middle" font-family="Arial" font-size="14" fill="#0f172a">
    ROUTE 53
  </text>
  <text x="290" y="163" text-anchor="middle" font-family="Arial" font-size="11" fill="#374151">
    DNS routing
  </text>

  <!-- Arrow: USERS -> Route 53 -->
  <line x1="160" y1="150" x2="220" y2="150" stroke="#374151" stroke-width="2"
        marker-end="url(#arrowhead)" />

  <!-- S3 + CloudFront -->
  <rect x="420" y="40" width="190" height="80" rx="8" ry="8" fill="#ecfdf5" stroke="#065f46" />
  <text x="515" y="70" text-anchor="middle" font-family="Arial" font-size="14" fill="#065f46">
    S3 bucket &amp; CloudFront
  </text>
  <text x="515" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#065f46">
    Static assets (images, CSS, JS)
  </text>

  <!-- Classic Load Balancer -->
  <rect x="420" y="180" width="190" height="60" rx="8" ry="8" fill="#fef3c7" stroke="#92400e" />
  <text x="515" y="205" text-anchor="middle" font-family="Arial" font-size="14" fill="#92400e">
    CLASSIC LOAD BALANCER
  </text>
  <text x="515" y="223" text-anchor="middle" font-family="Arial" font-size="11" fill="#92400e">
    Distributes dynamic traffic
  </text>

  <!-- EC2 ASG Instances -->
  <rect x="660" y="170" width="190" height="80" rx="8" ry="8" fill="#eff6ff" stroke="#1d4ed8" />
  <text x="755" y="195" text-anchor="middle" font-family="Arial" font-size="14" fill="#1d4ed8">
    EC2 ASG INSTANCES
  </text>
  <text x="755" y="213" text-anchor="middle" font-family="Arial" font-size="11" fill="#1d4ed8">
    Application logic &amp; APIs
  </text>
  <text x="755" y="231" text-anchor="middle" font-family="Arial" font-size="11" fill="#1d4ed8">
    Auto Scaling Group
  </text>

  <!-- Arrows from Route 53 to S3/CloudFront and Load Balancer -->
  <!-- Upward branch -->
  <line x1="360" y1="150" x2="390" y2="150" stroke="#374151" stroke-width="2" />
  <line x1="390" y1="150" x2="390" y2="80" stroke="#374151" stroke-width="2" />
  <line x1="390" y1="80" x2="420" y2="80" stroke="#374151" stroke-width="2"
        marker-end="url(#arrowhead)" />

  <!-- Downward branch -->
  <line x1="390" y1="150" x2="390" y2="210" stroke="#374151" stroke-width="2" />
  <line x1="390" y1="210" x2="420" y2="210" stroke="#374151" stroke-width="2"
        marker-end="url(#arrowhead)" />

  <!-- Arrow: Load Balancer -> EC2 ASG -->
  <line x1="610" y1="210" x2="660" y2="210" stroke="#374151" stroke-width="2"
        marker-end="url(#arrowhead)" />

  <!-- Labels for flows -->
  <text x="405" y="70" text-anchor="end" font-family="Arial" font-size="11" fill="#374151">
    Static content
  </text>
  <text x="405" y="220" text-anchor="end" font-family="Arial" font-size="11" fill="#374151">
    Dynamic requests
  </text>

</svg>